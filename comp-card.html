<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comp Card | Kira Malli</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="brand">
        <h1>Kira Malli</h1>
      </div>
      <nav class="site-nav">
        <a href="index.html">About Me</a>
        <a href="projects.html">Showreel</a>
        <a href="comp-card.html">Comp Card</a>
      </nav>
    </div>
  </header>

  <main class="content container">
    <section>
      <h2>Comp Card</h2>
      <div class="tabs">
        <div class="tab-buttons" role="tablist" aria-label="Comp card formats">
          <button class="tab-btn active" data-tab="jpg" role="tab" aria-selected="true">JPG</button>
          <button class="tab-btn" data-tab="pdf" role="tab" aria-selected="false">PDF</button>
        </div>

        <div class="tab-content active" id="jpg" role="tabpanel">
          <div class="jpg-preview">
            <div class="preview-actions">
              <a href="assets/images/comp-card.jpg" download class="button download-icon" aria-label="Download JPG">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="7 10 12 15 17 10"></polyline>
                  <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
              </a>
            </div>
            <img src="assets/images/comp-card.jpg" alt="Comp Card JPG" style="max-width:100%;height:auto;border-radius:8px;" />
            <p class="fallback">If the image doesn't load, <a href="assets/images/comp-card.jpg" target="_blank" rel="noopener" style="color: #38BDF8;">open the image</a>.</p>
          </div>
        </div>

        <div class="tab-content" id="pdf" role="tabpanel" aria-hidden="true">
          <div class="pdf-preview">
            <div class="viewer">
              <embed src="assets/pdfs/comp-card.pdf" type="application/pdf" width="100%" height="700px" />
              <p class="fallback">If the preview doesn't load, <a href="assets/pdfs/comp-card.pdf" target="_blank" rel="noopener" style="color: #38BDF8;">download the PDF</a>.</p>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Built with GitHub Pages · © 2026 Kira Malli</p>
    </div>
  </footer>
  <script src="assets/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const buttons = document.querySelectorAll('.tab-btn');
      const contents = document.querySelectorAll('.tab-content');
      buttons.forEach(btn => btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        buttons.forEach(b => {
          b.classList.toggle('active', b === btn);
          b.setAttribute('aria-selected', b === btn ? 'true' : 'false');
        });
        contents.forEach(c => {
          const isActive = c.id === tab;
          c.classList.toggle('active', isActive);
          c.setAttribute('aria-hidden', !isActive);
        });
      }));
    });
  </script>
</body>
</html>
